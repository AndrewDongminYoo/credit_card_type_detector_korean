include: package:very_good_analysis/analysis_options.yaml

analyzer:
  errors:
    avoid_equals_and_hash_code_on_mutable_classes: ignore
    avoid_types_on_closure_parameters: ignore
    constant_identifier_names: ignore
    directives_ordering: ignore
    lines_longer_than_80_chars: ignore
    public_member_api_docs: ignore
    use_setters_to_change_properties: ignore
  language:
    # Do not cast nullable values to non-nullable types.
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
