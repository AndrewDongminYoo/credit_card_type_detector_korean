name: credit_card_type_detector_korean
description: |
  Recognizes card types through BIN numbers of domestic credit card issuers in Korea.
  This Flutter package extends the functionality of credit_card_type_detector,
  maintaining vendor detection while focusing on identifying domestic card issuers.

version: 0.1.0+1

homepage: https://github.com/AndrewDongminYoo/credit_card_type_detector_korean
repository: https://github.com/AndrewDongminYoo/credit_card_type_detector_korean
issue_tracker: https://github.com/AndrewDongminYoo/credit_card_type_detector_korean/issues

dependencies:
  credit_card_type_detector: ^3.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.10.0

environment:
  sdk: ">=3.10.0 <4.0.0"

dev_dependencies:
  build_runner: ^2.10.5
  freezed: ^3.2.5
  import_sorter: ^4.6.0
  json_serializable: ^6.12.0
  mockito: ^5.6.3
  test: ^1.29.0
  very_good_analysis: ^10.1.0

import_sorter:
  emojis: true
