name: ci

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  semantic_pull_request:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/semantic_pull_request.yml@v1

  spell-check:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/spell_check.yml@v1
    with:
      includes: "**/*.md"
      modified_files_only: false
      config: cspell.json

  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/dart_package.yml@v1
    with:
      check_ignore: true
      coverage_excludes: "**/*.g.dart **/*.freezed.dart"
      format_line_length: 160
      min_coverage: 100

  # Integrity gate: the bundled BIN dataset (lib/src/data.dart) and its version
  # stamp (lib/src/dataset_version.dart) are generated from the source CSV.
  # Regenerate them here and fail if they drift from what is committed — this
  # catches hand-edits to the generated files and stale version stamps.
  verify_generated_data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Regenerate dataset from source CSV
        run: dart run tool/generate_data.dart

      - name: Format generated files
        run: dart format lib/src/data.dart lib/src/dataset_version.dart --line-length 160

      - name: Fail on drift between CSV and committed generated files
        run: git diff --exit-code -- lib/src/data.dart lib/src/dataset_version.dart
